services:
  e2e:
    build:
      context: .
      dockerfile: Dockerfile.e2e
    environment:
      CI: "true"
      PUBLIC_SUPABASE_URL: ${PUBLIC_SUPABASE_URL}
      PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${PUBLIC_SUPABASE_PUBLISHABLE_KEY}
      AUTH_CALLBACK_URL: ${AUTH_CALLBACK_URL}
    command: pnpm ci:e2e
